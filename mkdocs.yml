site_name: Crawfish
site_description: Build agents like software — typed, composable, deterministic, and local-first.
site_url: https://neal-kotval.github.io/crawfish/
docs_dir: docs

# Internal doc-authoring findings log — kept in-repo for the team, not published.
exclude_docs: |
  BUILD-LOG.md
repo_url: https://github.com/Neal-Kotval/crawfish

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: red
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: red
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest

extra_css:
  - assets/extra.css

extra:
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guide:
      - Getting started: guide/getting-started.md
      - Tutorial: guide/tutorial.md
      - Concepts: guide/concepts.md
      - Refine & verify: guide/refine-and-verify.md
      - Compose — branch, cycle, recurse: guide/compose.md
      - Train, calibrate & promote: guide/train-and-tune.md
      - Taming stochasticity: guide/tameness.md
      - Drive the language from the CLI: guide/optimize-from-the-cli.md
      - Agents as variables — compose, version, summon: guide/variables-and-knowledge.md
      - CLI reference: guide/cli.md
      - Cookbook: guide/cookbook.md
      - Contributing a connector: guide/contributing-a-connector.md
      - Connector ideas: guide/connector-ideas.md
      - API reference: guide/api-reference.md
      - Release notes: guide/release-notes.md
  - Operate & Observe:
      - Overview: guide/operations.md
      - Deploy: guide/deploy.md
      - Manage: guide/manage.md
      - Observers: guide/observers.md
      - Visualize: guide/visualize.md
      - Project structure: guide/project-structure.md
      - Export to Claude Code: guide/claude-code-export.md
  - Reference:
      - Overview: reference/index.md
      - Foundations:
          - Core types: reference/core-types.md
          - Type system: reference/type-system.md
          - Versioning & stability: reference/versioning-and-stability.md
          - Context & budgets: reference/context-and-budgets.md
      - Building pipelines:
          - Output & wiring: reference/output-and-wiring.md
          - Validation: reference/validation.md
