site_name: Crawfish
site_description: Agents for bulk work over your data — Source → Batch → Aggregator → Router → Sink.
site_url: https://neal-kotval.github.io/crawfish/
docs_dir: docs

# Internal doc-authoring findings log — kept in-repo for the team, not published.
exclude_docs: |
  BUILD-LOG.md
repo_url: https://github.com/Neal-Kotval/crawfish

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: red
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: red
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guide:
      - Getting started: guide/getting-started.md
      - Tutorial: guide/tutorial.md
      - Concepts: guide/concepts.md
      - Cookbook: guide/cookbook.md
      - Contributing a connector: guide/contributing-a-connector.md
      - Connector ideas: guide/connector-ideas.md
      - API reference: guide/api-reference.md
  - Operate & Observe:
      - Overview: guide/operations.md
      - Deploy: guide/deploy.md
      - Manage: guide/manage.md
      - Observers: guide/observers.md
      - Visualize: guide/visualize.md
      - Project structure: guide/project-structure.md
      - Export to Claude Code: guide/claude-code-export.md
  - Reference:
      - Overview: reference/index.md
      - Substrate:
          - Core types: reference/core-types.md
          - Type system: reference/type-system.md
          - Versioning & stability: reference/versioning-and-stability.md
          - Context & budgets: reference/context-and-budgets.md
      - Wiring & data:
          - Output & wiring: reference/output-and-wiring.md
          - Validation: reference/validation.md
          - Context carry: reference/context-carry.md
      - Authoring agents:
          - Definition: reference/definition.md
          - Runtimes: reference/runtimes.md
          - Providers: reference/providers.md
      - Pipeline nodes:
          - Source & filter: reference/nodes-source-filter.md
          - Aggregator: reference/nodes-aggregator.md
          - Router & sink: reference/nodes-router-sink.md
      - Running work:
          - Run & engine: reference/run-and-engine.md
          - Batch & execution: reference/batch-and-execution.md
          - Persistence: reference/persistence.md
      - Observe & control:
          - Emission, inspector & visualize: reference/emission-inspector-visualize.md
          - Anomaly: reference/anomaly.md
