site_name: Crawfish
site_description: A programming language for agents. Write them as typed code, run them locally, test and improve them like software.
site_url: https://neal-kotval.github.io/crawfish/
docs_dir: docs

# Internal, non-published trees: implementation specs (link to source files outside
# docs_dir) and dev orchestration notes. Excluded from the built site so `mkdocs build
# --strict` does not abort on their intentional source-code links.
exclude_docs: |
  specs/
  dev/

# Internal authoring notes, ADRs, roadmap, and product material live in /dev_docs
# at the repo root. That folder is outside docs_dir, so it is never published.
repo_url: https://github.com/Neal-Kotval/crawfish

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: red
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: red
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest

extra_css:
  - assets/extra.css

extra:
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

