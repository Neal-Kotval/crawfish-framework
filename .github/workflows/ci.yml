name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Typecheck (mypy)
        run: uv run mypy packages/crawfish/src packages/crawfish-slack/src
      - name: Test (pytest)
        run: uv run pytest -q
      - name: Build wheel
        run: uv build packages/crawfish
      - name: Build docs site
        run: uv run --group docs mkdocs build --strict
